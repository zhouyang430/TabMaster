<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabMaster Pro - 预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #f7f7f7 0%, #ffffff 100%);
      min-height: 100vh;
      color: #37352f;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .preview-container {
      width: 420px;
      max-height: 550px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 
        0 1px 2px rgba(0, 0, 0, 0.05),
        0 4px 6px rgba(0, 0, 0, 0.03),
        0 10px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      width: 14px;
      height: 14px;
      color: #9b958c;
    }

    .search-input {
      width: 100%;
      height: 32px;
      padding: 0 12px 0 36px;
      background: #f7f7f7;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #37352f;
      font-size: 13px;
      outline: none;
      transition: all 100ms;
    }

    .search-input:focus {
      border-color: #37352f;
      background: #ffffff;
    }

    .search-input::placeholder {
      color: #9b958c;
    }

    .panel-body {
      flex: 1;
      padding: 8px;
      overflow-y: auto;
    }

    .domain-group {
      margin-bottom: 4px;
      border-radius: 4px;
      overflow: hidden;
    }

    .domain-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 100ms;
    }

    .domain-header:hover {
      background: rgba(55, 53, 47, 0.03);
    }

    .domain-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .domain-icon {
      width: 16px;
      height: 16px;
      font-size: 14px;
    }

    .domain-name {
      font-size: 12px;
      font-weight: 600;
      color: #37352f;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .domain-count {
      font-size: 11px;
      color: #9b958c;
      background: #f7f7f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .tabs-list {
      padding-left: 12px;
      padding-right: 12px;
      padding-bottom: 8px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 80ms;
      margin-bottom: 2px;
    }

    .tab-item:hover {
      background: rgba(55, 53, 47, 0.06);
    }

    .tab-item.active {
      background: rgba(55, 53, 47, 0.08);
    }

    .tab-favicon {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #6b655c;
    }

    .tab-title {
      flex: 1;
      font-size: 13px;
      color: #37352f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-close {
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      border-radius: 3px;
      color: #9b958c;
      cursor: pointer;
      opacity: 0;
      transition: all 80ms;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .tab-item:hover .tab-close {
      opacity: 1;
    }

    .tab-close:hover {
      background: rgba(55, 53, 47, 0.1);
      color: #37352f;
    }

    .panel-footer {
      padding: 8px 12px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      height: 28px;
      border: none;
      background: #f7f7f7;
      border-radius: 4px;
      color: #37352f;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 100ms;
    }

    .action-btn:hover {
      background: rgba(55, 53, 47, 0.08);
    }

    .orb-preview {
      position: fixed;
      right: 30px;
      bottom: 30px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 
        0 2px 8px rgba(0, 0, 0, 0.1),
        0 4px 16px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-count {
      font-size: 14px;
      font-weight: 600;
      color: #37352f;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="panel-header">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" placeholder="搜索标签..." />
      </div>
    </div>

    <div class="panel-body">
      <div class="domain-group">
        <div class="domain-header">
          <div class="domain-title-wrapper">
            <span class="domain-icon">📄</span>
            <span class="domain-name">飞书文档</span>
          </div>
          <span class="domain-count">5</span>
        </div>
        <div class="tabs-list">
          <div class="tab-item active">
            <div class="tab-favicon">F</div>
            <span class="tab-title">视频抽帧能力 PRD (重构版 V1.0)</span>
            <button class="tab-close">×</button>
          </div>
          <div class="tab-item">
            <div class="tab-favicon">F</div>
            <span class="tab-title">蚂蚁安全团队SingGuard论文分享</span>
            <button class="tab-close">×</button>
          </div>
          <div class="tab-item">
            <div class="tab-favicon">F</div>
            <span class="tab-title">世界模型到底在建模什么</span>
            <button class="tab-close">×</button>
          </div>
          <div class="tab-item">
            <div class="tab-favicon">F</div>
            <span class="tab-title">Polaris Agent One Pager</span>
            <button class="tab-close">×</button>
          </div>
          <div class="tab-item">
            <div class="tab-favicon">F</div>
            <span class="tab-title">模型中台能力建设 | 项目进展</span>
            <button class="tab-close">×</button>
          </div>
        </div>
      </div>

      <div class="domain-group">
        <div class="domain-header">
          <div class="domain-title-wrapper">
            <span class="domain-icon">💻</span>
            <span class="domain-name">GitHub</span>
          </div>
          <span class="domain-count">1</span>
        </div>
        <div class="tabs-list">
          <div class="tab-item">
            <div class="tab-favicon">G</div>
            <span class="tab-title">GitHub · Change is constant</span>
            <button class="tab-close">×</button>
          </div>
        </div>
      </div>

      <div class="domain-group">
        <div class="domain-header">
          <div class="domain-title-wrapper">
            <span class="domain-icon">🎨</span>
            <span class="domain-name">设计工具</span>
          </div>
          <span class="domain-count">1</span>
        </div>
        <div class="tabs-list">
          <div class="tab-item">
            <div class="tab-favicon">F</div>
            <span class="tab-title">wzy - Figma</span>
            <button class="tab-close">×</button>
          </div>
        </div>
      </div>

      <div class="domain-group">
        <div class="domain-header">
          <div class="domain-title-wrapper">
            <span class="domain-icon">📁</span>
            <span class="domain-name">未分类</span>
          </div>
          <span class="domain-count">1</span>
        </div>
        <div class="tabs-list">
          <div class="tab-item">
            <div class="tab-favicon">G</div>
            <span class="tab-title">github - Google 搜索</span>
            <button class="tab-close">×</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-footer">
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
          <path d="M22 3H2a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h20a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1z"></path>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        <span>一键去重</span>
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span>设置</span>
      </button>
    </div>
  </div>

  <div class="orb-preview">
    <span class="orb-count">8</span>
  </div>
</body>
</html>
