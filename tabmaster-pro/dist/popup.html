<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabMaster Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: rgba(15, 23, 42, 0.95);
      color: rgba(255, 255, 255, 0.9);
      width: 280px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: rgba(59, 130, 246, 0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 18px;
      height: 18px;
      color: #3b82f6;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #3b82f6;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      cursor: pointer;
      transition: all 150ms;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .action-btn svg {
      width: 16px;
      height: 16px;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 12px 0;
    }

    .footer {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="4" y="3" width="16" height="18" rx="2" ry="2"></rect>
        <line x1="4" y1="10" x2="20" y2="10"></line>
      </svg>
    </div>
    <div>
      <div class="title">TabMaster Pro</div>
      <div class="subtitle">智能标签管理</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="tab-count">0</div>
      <div class="stat-label">当前标签</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="dedup-count">0</div>
      <div class="stat-label">已去重</div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn" id="open-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      设置中心
    </button>
    
    <button class="action-btn" id="open-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="16"></line>
      </svg>
      使用统计
    </button>

    <button class="action-btn" id="run-dedup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 3H2a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h20a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1z"></path>
        <path d="M16 10a4 4 0 0 1-8 0"></path>
      </svg>
      一键去重
    </button>
  </div>

  <div class="divider"></div>

  <div class="footer">TabMaster Pro v1.0.0</div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      chrome.tabs.query({}, tabs => {
        document.getElementById('tab-count').textContent = tabs.length;
      });

      chrome.runtime.sendMessage({ type: 'getStats' }, stats => {
        document.getElementById('dedup-count').textContent = stats.totalDeduplicated || 0;
      });

      document.getElementById('open-settings').addEventListener('click', () => {
        chrome.runtime.sendMessage({ type: 'openSettings' });
        window.close();
      });

      document.getElementById('open-stats').addEventListener('click', () => {
        chrome.runtime.sendMessage({ type: 'openStats' });
        window.close();
      });

      document.getElementById('run-dedup').addEventListener('click', () => {
        chrome.runtime.sendMessage({ type: 'deduplicate' }, count => {
          alert(`已关闭 ${count} 个重复标签`);
          window.close();
        });
      });
    });
  </script>
</body>
</html>
